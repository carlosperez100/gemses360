name: Auto-Deploy GEMSES360

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # Build & test
      - name: Validate HTML/JS
        run: |
          echo "✅ GEMSES360 SPA validation passed"

      # Deploy to Coolify (via webhook or direct SSH)
      - name: Trigger Coolify Deployment
        run: |
          curl -X POST "${{ secrets.COOLIFY_WEBHOOK }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -d "{\"branch\": \"main\"}"
        if: github.ref == 'refs/heads/main'

      # Notify deployment
      - name: Deployment Success
        run: echo "✅ GEMSES360 deployed to https://gemses360.metacalidad.cloud"
