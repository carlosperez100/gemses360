// ---------- cálculos ----------
function statsCadena(){
  const macros={}, comps={}; let s=0,n=0;
  CADENA.forEach((it,i)=>{ const v=ST.vc[i]; if(v===null) return;
    s+=v; n++;
    (macros[it.macro]=macros[it.macro]||{s:0,n:0}); macros[it.macro].s+=v; macros[it.macro].n++;
    const k=it.macro+"|"+it.comp;
    (comps[k]=comps[k]||{macro:it.macro,comp:it.comp,s:0,n:0}); comps[k].s+=v; comps[k].n++; });
  const pct=(o)=>o.n?Math.round(o.s/(o.n*4)*100):0;
  return {global:n?Math.round(s/(n*4)*100):0, resp:n, tot:CADENA.length,
    macros:Object.fromEntries(Object.entries(macros).map(([k,o])=>[k,pct(o)])),
    comps:Object.values(comps).map(c=>({...c,pct:pct(c)}))};
}
function fyd(){
  const F=[],D=[];
  CADENA.forEach((it,i)=>{ const v=ST.vc[i]; if(v===null) return;
    if(v>=2) F.push({i,...it,val:v});
    else D.push({i,...it,val:4-v}); }); // valor de debilidad invertido (0→4, 1→3)
  return {F,D};
}
function oya(){
  const O=[],A=[];
  PESTQ.forEach((it,i)=>{ const v=ST.vp[i]; if(v===null) return;

    else A.push({i,dim:it.dim,texto:it.neg||("NO: "+it.crit),val:4-v}); });
  return {O,A};
}

}

function pCad(){

  }
  return h+`<p><button class="btn teal" onclick="go('pest')">Continuar al PEST ▶</button></p></div>`;
}

    h+=`<h3>● ${d}</h3><table>`;
    PESTQ.forEach((it,i)=>{ if(it.dim!==d) return;
      let r=""; for(let v=0;v<=4;v++) r+=`<label><input type="radio" name="p${i}" value="${v}" ${ST.vp[i]===v?"checked":""} onchange="ST.vp[${i}]=${v};save()">${v}</label>`;
      h+=`<tr><td style="width:30px">${i+1}</td><td>${it.crit}${it.neg?`<br><span class="mini" style="color:#a33">⇄ ${it.neg}</span>`:""}</td><td class="esc" style="width:170px">${r}</td></tr>`; });
    h+=`</table>`;
  }
  return h+`<p><button class="btn teal" onclick="go('nivel')">Ver tablero ▶</button></p></div>`;
}
function pNivel(){
  const st=statsCadena(); const {N,idx}=nivelInfo(st.global);
  let niv=`<div class="niveles">`+N.map((n,i)=>`<div class="niv ${i===idx?'on':''}" style="background:${n[2]};height:${40+i*16}px">${n[0]}%<br>${n[1]}</div>`).join("")+`</div>`;
  return `<div class="card"><h2>Nivel de Gestión Interno según el Modelo GEMSES</h2>
  <div class="kpi"><b>${st.global}%</b>Nivel de gestión</div>
  ${bar(st.global,"#00B0A6",st.global+"% logrado")}
  ${bar(100-st.global,"#999",(100-st.global)+"% potencial de mejora")}
  ${niv}
  <p>${st.global<50?'<b style="color:var(--rojo)">Gestión REACTIVA</b>':st.global<75?'En transición hacia gestión de procesos':'<b style="color:var(--verde)">Gestión PROACTIVA</b>'} — ${st.resp} de ${st.tot} criterios evaluados.</p></div>`;
}
function pMacro(){
  const st=statsCadena();
  let h=`<div class="card"><h2>Nivel de gestión por Macroproceso</h2>`;
  for(const m of MACROS){ const p=st.macros[m]||0;
    h+=`<p style="margin:8px 0 2px"><b style="color:${colM[m]}">${m}</b></p>${bar(p,colM[m])}`; }
  return h+`</div>`;
}
let F_COMP="Todas";
function pComp(){
  const st=statsCadena();
  let lista=st.comps; if(F_COMP!=="Todas") lista=lista.filter(c=>c.macro===F_COMP);
  lista=[...lista].sort((a,b)=>a.pct-b.pct);
  let h=`<div class="card"><h2>Nivel de gestión por Componentes</h2>
  <div class="filtro">Macroproceso: <select onchange="F_COMP=this.value;render()">${["Todas",...MACROS].map(m=>`<option ${m===F_COMP?"selected":""}>${m}</option>`).join("")}</select></div>`;
  lista.forEach(c=>{ h+=`<p style="margin:7px 0 2px"><b style="color:${colM[c.macro]}">[${c.macro}]</b> ${c.comp} <span class="mini">(${c.n} ítems)</span></p>${bar(c.pct,colM[c.macro])}`; });
  return h+`</div>`;
}
let F_PAR="Todas";
function pPareto(){
  let items=CADENA.map((it,i)=>({i,...it,v:ST.vc[i]})).filter(x=>x.v!==null);
  if(F_PAR!=="Todas") items=items.filter(x=>x.macro===F_PAR);
  items.forEach(x=>x.brecha=4-x.v);
  items=items.filter(x=>x.brecha>0).sort((a,b)=>b.brecha-a.brecha).slice(0,25);
  const tot=items.reduce((a,b)=>a+b.brecha,0)||1;
  let acc=0; items.forEach(x=>{acc+=x.brecha; x.acum=Math.round(acc/tot*100);});
  // SVG pareto
  const W=980,H=300,P=40,bw=items.length?(W-2*P)/items.length:1;
  let bars="",line="",pts=[];
  items.forEach((x,k)=>{
    const bh=x.brecha/4*(H-2*P);
    bars+=`<rect x="${P+k*bw+2}" y="${H-P-bh}" width="${bw-4}" height="${bh}" fill="${colM[x.macro]}"><title>${x.crit} (brecha ${x.brecha})</title></rect>`;
    bars+=`<text x="${P+k*bw+bw/2}" y="${H-P-bh-4}" font-size="9" text-anchor="middle">${x.brecha}</text>`;
    pts.push([P+k*bw+bw/2, H-P-(x.acum/100)*(H-2*P)]);
  });
  if(pts.length) line=`<polyline points="${pts.map(p=>p.join(",")).join(" ")}" fill="none" stroke="#C00000" stroke-width="2"/>`+pts.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="2.5" fill="#C00000"/>`).join("");
  const y80=H-P-0.8*(H-2*P);
  let h=`<div class="card"><h2>Pareto de ítems (brecha = 4 − valoración)</h2>
  <div class="filtro">Macroproceso: <select onchange="F_PAR=this.value;render()">${["Todas",...MACROS].map(m=>`<option ${m===F_PAR?"selected":""}>${m}</option>`).join("")}</select></div>
  <svg viewBox="0 0 ${W} ${H}" style="width:100%;background:#fff">
    <line x1="${P}" y1="${H-P}" x2="${W-P}" y2="${H-P}" stroke="#999"/>
    <line x1="${P}" y1="${y80}" x2="${W-P}" y2="${y80}" stroke="#C00000" stroke-dasharray="5,4"/>
    <text x="${W-P}" y="${y80-5}" font-size="11" fill="#C00000" text-anchor="end">80%</text>
    ${bars}${line}</svg>
  <table><tr><th>#</th><th>Ítem</th><th>Macro</th><th>Brecha</th><th>% acumulado</th></tr>`;
  items.forEach((x,k)=>{ h+=`<tr ${x.acum<=80?'style="background:#fff4f4"':''}><td>${k+1}</td><td>${x.crit}</td><td style="color:${colM[x.macro]};font-weight:bold">${x.macro}</td><td>${x.brecha}</td><td>${x.acum}%</td></tr>`; });
  return h+`</table><p class="mini">Los ítems sombreados (≤80% acumulado) concentran el potencial de mejora — principio de Pareto.</p></div>`;
}
let F_FD="Todas";
function pFD(){
  const {F,D}=fyd();
  const fil=x=>F_FD==="Todas"||x.macro===F_FD;
  let h=`<div class="card"><h2>Análisis interno: Fortalezas y Debilidades</h2>
  <div class="filtro">Macroproceso: <select onchange="F_FD=this.value;render()">${["Todas",...MACROS].map(m=>`<option ${m===F_FD?"selected":""}>${m}</option>`).join("")}</select></div>
  <h3 class="tagD">DEBILIDADES (valoración original 0–1 → valor invertido 3–4)</h3>
  <table><tr><th>Debilidad (brecha del criterio)</th><th>Macro</th><th>Componente</th><th>Valor</th></tr>`;
  D.filter(fil).sort((a,b)=>b.val-a.val).forEach(d=> h+=`<tr><td>${d.crit}</td><td style="color:${colM[d.macro]};font-weight:bold">${d.macro}</td><td>${d.comp}</td><td class="tagD">${d.val}</td></tr>`);
  h+=`</table><h3 class="tagF">FORTALEZAS (valoración 2–4)</h3>
  <table><tr><th>Fortaleza</th><th>Macro</th><th>Componente</th><th>Valor</th></tr>`;
  F.filter(fil).sort((a,b)=>b.val-a.val).forEach(f=> h+=`<tr><td>${f.crit}</td><td style="color:${colM[f.macro]};font-weight:bold">${f.macro}</td><td>${f.comp}</td><td class="tagF">${f.val}</td></tr>`);
  return h+`</table></div>`;
}
let F_OA="Todas";
function pOA(){
  const {O,A}=oya();
  const fil=x=>F_OA==="Todas"||x.dim===F_OA;
  let h=`<div class="card"><h2>Análisis externo: Oportunidades y Amenazas (PEST)</h2>
  <div class="filtro">Dimensión: <select onchange="F_OA=this.value;render()">${["Todas",...DIMS].map(m=>`<option ${m===F_OA?"selected":""}>${m}</option>`).join("")}</select></div>
  <h3 class="tagD">AMENAZAS (valor invertido)</h3><table><tr><th>Amenaza</th><th>Dimensión</th><th>Valor</th></tr>`;
  A.filter(fil).sort((a,b)=>b.val-a.val).forEach(a=> h+=`<tr><td>${a.texto}</td><td>${a.dim}</td><td class="tagD">${a.val}</td></tr>`);
  h+=`</table><h3 class="tagF">OPORTUNIDADES</h3><table><tr><th>Oportunidad</th><th>Dimensión</th><th>Valor</th></tr>`;
  O.filter(fil).sort((a,b)=>b.val-a.val).forEach(o=> h+=`<tr><td>${o.crit}</td><td>${o.dim}</td><td class="tagF">${o.val}</td></tr>`);
  return h+`</table></div>`;
}
function pPrio(){
  const {D}=fyd();
  D.forEach(d=>{ if(!(d.i in ST.pesos)) ST.pesos[d.i]=5; });
  const lista=[...D].sort((a,b)=>(ST.pesos[b.i]*b.val)-(ST.pesos[a.i]*a.val));
  let h=`<div class="card"><h2>Priorización — consolidado de DEBILIDADES (Peso × Valor)</h2>
  <p class="mini">Asigne el peso (1–10) según importancia/frecuencia. La tabla se reordena automáticamente; las primeras debilidades alimentan el Plan.</p>
  <table><tr><th>Orden</th><th>Debilidad</th><th>Macro</th><th>Peso (1–10)</th><th>Valor</th><th>PxV</th></tr>`;
  lista.forEach((d,k)=>{ h+=`<tr><td><b>${k+1}°</b></td><td>${d.crit}</td><td style="color:${colM[d.macro]};font-weight:bold">${d.macro}</td>
   <td><input type="number" min="1" max="10" value="${ST.pesos[d.i]}" style="width:55px" onchange="ST.pesos[${d.i}]=Math.max(1,Math.min(10,+this.value||5));save();render()"></td>
   <td>${d.val}</td><td><b>${ST.pesos[d.i]*d.val}</b></td></tr>`; });
  return h+`</table></div>`;
}
function pPlan(){
  const {D}=fyd();
  const ordered=[...D].sort((a,b)=>((ST.pesos[b.i]||5)*b.val)-((ST.pesos[a.i]||5)*a.val));
  let h=`<div class="card"><h2>Plan: agrupar debilidades → Objetivo, Estrategias y Metas</h2>
  <p class="mini">Cree grupos temáticos de debilidades. Cada grupo recibe: OEI de EsSalud al que se alinea, objetivo del servicio (verbo ORGANIZAR — jefa de servicio), estrategias con su factibilidad y metas operativas.</p>
  <button class="btn teal" onclick="ST.grupos.push({nombre:'Grupo '+(ST.grupos.length+1),debs:[],oei:OEI[1],obj:'',est:[{t:'',f:'Alta'},{t:'',f:'Media'},{t:'',f:'Alta'}],metas:['','','']});save();render()">➕ Nuevo grupo</button>`;
  ST.grupos.forEach((g,gi)=>{
    h+=`<div class="grupoCard">
    <p><input type="text" value="${g.nombre.replace(/"/g,'&quot;')}" style="font-weight:bold;width:300px" onchange="ST.grupos[${gi}].nombre=this.value;save()">
    <button class="btn sec" style="float:right" onclick="if(confirm('¿Eliminar grupo?')){ST.grupos.splice(${gi},1);save();render()}">🗑</button></p>
    <p><b>Debilidades del grupo:</b><br>${g.debs.map(di=>{const d=CADENA[di];return `<span class="deb-chip">${d?d.crit.slice(0,70):di} <a href="#" onclick="ST.grupos[${gi}].debs=ST.grupos[${gi}].debs.filter(x=>x!==${di});save();render();return false">✕</a></span>`;}).join("")||'<span class="mini">(vacío)</span>'}</p>
    <p>Agregar debilidad: <select onchange="if(this.value!==''){ST.grupos[${gi}].debs.push(+this.value);save();render()}">
      <option value="">— elegir (ordenadas por PxV) —</option>
      ${ordered.filter(d=>!g.debs.includes(d.i)).map(d=>`<option value="${d.i}">[${d.macro}] ${d.crit.slice(0,90)} (PxV ${(ST.pesos[d.i]||5)*d.val})</option>`).join("")}</select></p>
    <p><b>OEI EsSalud:</b> <select style="width:95%" onchange="ST.grupos[${gi}].oei=this.value;save()">${OEI.map(o=>`<option ${o===g.oei?"selected":""}>${o}</option>`).join("")}</select></p>
    <p><b>Objetivo del servicio:</b><textarea placeholder="Organizar ..." onchange="ST.grupos[${gi}].obj=this.value;save()">${g.obj||""}</textarea></p>
    <b>Estrategias (con factibilidad de ejecución):</b>`;
    g.est.forEach((e,ei)=>{ h+=`<p style="display:flex;gap:6px">${ei+1}. <textarea style="flex:1" onchange="ST.grupos[${gi}].est[${ei}].t=this.value;save()">${e.t||""}</textarea>
      <select onchange="ST.grupos[${gi}].est[${ei}].f=this.value;save()">${["Alta","Media","Baja"].map(f=>`<option ${f===e.f?"selected":""}>${f}</option>`).join("")}</select></p>`; });
    h+=`<b>Metas operativas:</b>`;
    g.metas.forEach((m,mi)=>{ h+=`<p style="display:flex;gap:6px">${mi+1}. <textarea style="flex:1" onchange="ST.grupos[${gi}].metas[${mi}]=this.value;save()">${m||""}</textarea></p>`; });
    h+=`</div>`;
  });
  return h+`</div>`;
}
function pExp(){
  return `<div class="card"><h2>Exportar</h2>
  <p><b>→ A GEMSES360 (nube):</b> descarga los CSV en el formato del importador de la plataforma y súbelos con «⬆ Importar .xls/.csv» del módulo Plan de Gestión.</p>
  <button class="btn teal" onclick="expCadenaCSV()">⬇ CSV Cadena (GEMSES360)</button>
  <button class="btn teal" onclick="expPestCSV()">⬇ CSV PEST (GEMSES360)</button>
  <p><b>→ Respaldo y plan:</b></p>
  <button class="btn" onclick="expJSON()">⬇ JSON completo</button>
  <button class="btn" onclick="expPlanCSV()">⬇ CSV Plan (grupos/objetivos/metas)</button>
  <button class="btn sec" onclick="window.print()">🖨 Imprimir / PDF</button>
  <p class="mini">El CSV de Cadena usa las columnas: macroproceso, componente, criterio, debilidad, valoracion. El de PEST: dimension, oportunidad, amenaza, valoracion — exactamente lo que GEMSES360 reconoce.</p></div>`;
}

// ---------- export ----------
function dl(n,c,t){ const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([c],{type:t})); a.download=n; a.click(); }
const q=s=>'"'+String(s??"").replace(/"/g,'""')+'"';
function expCadenaCSV(){
  let r=["macroproceso,componente,criterio,debilidad,valoracion"];
  CADENA.forEach((it,i)=>r.push([q(it.macro),q(it.comp),q(it.crit),q(""),ST.vc[i]??""].join(",")));
  dl("GEMSES360_cadena_6B.csv","﻿"+r.join("\r\n"),"text/csv;charset=utf-8");
}
function expPestCSV(){
  let r=["dimension,oportunidad,amenaza,valoracion"];
  PESTQ.forEach((it,i)=>r.push([q(it.dim),q(it.crit),q(it.neg||""),ST.vp[i]??""].join(",")));
  dl("GEMSES360_pest_6B.csv","﻿"+r.join("\r\n"),"text/csv;charset=utf-8");
}
function expJSON(){ dl("tablero_gemses_6b.json", JSON.stringify({fecha:new Date().toISOString(),servicio:"6B Cirugía de Páncreas HNERM",estado:ST,stats:statsCadena()},null,2),"application/json"); }
function expPlanCSV(){
  let r=["grupo,oei_essalud,objetivo,estrategia,factibilidad,meta,debilidades"];
  ST.grupos.forEach(g=>{
    const debs=g.debs.map(di=>CADENA[di]?.crit).join(" | ");
    const n=Math.max(g.est.length,g.metas.length);
    for(let k=0;k<n;k++) r.push([q(g.nombre),q(g.oei),q(g.obj),q(g.est[k]?.t||""),q(g.est[k]?.f||""),q(g.metas[k]||""),q(debs)].join(","));
  });
  dl("PLAN_objetivos_estrategias_metas_6B.csv","﻿"+r.join("\r\n"),"text/csv;charset=utf-8");
}

// ---------- render ----------
function render(){
  const f={portada:pPortada,cad:pCad,pest:pPest,nivel:pNivel,macro:pMacro,comp:pComp,pareto:pPareto,fd:pFD,oa:pOA,prio:pPrio,plan:pPlan,exp:pExp}[CUR];
  main.innerHTML=`<div class="page act">${f()}</div>`;
}
go("portada");
</script>
</body>
</html>
