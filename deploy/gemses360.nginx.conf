server {
    listen 80;
    listen [::]:80;
    server_name gemses360.metacalidad.cloud;

    root /var/www/gemses360;
    index index.html;

    # SPA de un solo archivo: cualquier ruta sirve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de estáticos
    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public";
    }

    # No cachear el HTML para que los cambios se vean al instante
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
